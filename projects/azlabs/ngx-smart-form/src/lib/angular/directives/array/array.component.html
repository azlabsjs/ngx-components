@if (!(cssClass | istable)) {
  <ngx-form-array-outlet [class.hidden]="hidden" (removed)="removed($event)" [inputs]="inputs" [auto-upload]="autoupload" [template]="template" [no-grid-layout]="noGridLayout" [detached]="detached" #container>
    @if (refCount === 0 && !!placeholder) {
      <div class="placeholder"> {{ placeholder }}</div>
    }
    <ng-container *ngTemplateOutlet="addref ? addref : _add; context: { $implicit: add.bind(this) }"></ng-container>
  </ngx-form-array-outlet>
}

<!-- table layout -->
@if (cssClass.includes('table')) {
  <ngx-table-form [class.hidden]="hidden" (removed)="removed($event)" [inputs]="inputs" [auto-upload]="autoupload" [template]="template" [label]="label" [detached]="detached" [title]="title" [modal]="modal" [name]="name" #container>
    <ng-container *ngTemplateOutlet="addref ? addref : _add; context: { $implicit: add.bind(this) }"></ng-container>
  </ngx-table-form>
}

<ng-template #_add let-handler>
  <div class="margin-top">
    <ngx-add-button (click)="handler($event)"></ngx-add-button>
  </div>
</ng-template>
