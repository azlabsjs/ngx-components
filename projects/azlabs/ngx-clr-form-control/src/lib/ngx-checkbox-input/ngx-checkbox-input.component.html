<div
  fetchOptions
  (optionsChange)="onOptionsChange($event)"
  [loaded]="state.loaded"
  [config]="state.config.optionsConfig"
  [name]="state.config.name"
  >
  @if (state.config | hasoptions) {
    <div class="clr-form-control">
      <ng-content select="[label]"></ng-content>
      <div class="clr-control-container clr-control-inline">
        @for (item of state.config.options; track item) {
          <ngx-checkbox
            [checked]="item.value | isChecked : state.selection"
            [text]="item.description ?? item.name"
            (change)="onChange({ value: item.value, checked: $event })"
            [disabled]="disabled"
            >
          </ngx-checkbox>
        }
      </div>
    </div>
    @if (describe) {
      <span
        [class]="'input__subtext'"
        [innerHTML]="state.config.description || '' | trustHtml"
      ></span>
    }
    <ng-content></ng-content>
  }
</div>
