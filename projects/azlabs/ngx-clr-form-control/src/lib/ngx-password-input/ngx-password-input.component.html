@if (state) {
  <ng-container
    *ngTemplateOutlet="
      inputRef;
      context: {
        state: state,
        toggle: toggle.bind(this),
        config,
        control,
        defaultMaxLength: Mt.pow(2, 31) - 1}"></ng-container>
}
@if (describe) {
  <span [class]="'input__subtext'" [innerHTML]="config.description || '' | trustHtml"></span>
}
