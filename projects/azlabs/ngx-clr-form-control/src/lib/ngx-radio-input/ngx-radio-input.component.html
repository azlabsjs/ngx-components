@if (state && state.config) {
  <div fetchOptions (optionsChange)="onOptionsChange($event)" [loaded]="state.loaded" [config]="state.config.optionsConfig" [name]="state.config.name">
    @if (state.config.options; as options) {
      @if (options!.length > 0) {
        <ng-container *ngTemplateOutlet="inputRef; context: { options: options, config: state.config, control }"></ng-container>
        @if (describe) {
          <span [class]="'input__subtext'" [innerHTML]="state.config.description || '' | trustHtml"></span>
        }
      }
    }
  </div>
}
